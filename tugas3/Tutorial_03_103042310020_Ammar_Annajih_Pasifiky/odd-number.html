<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tutorial 03 - Odd Number Calculator</title>
  </head>
  <body>
    <main>
      <section>
        <h1>Odd Number Calculator</h1>
        <p>Masukkan nilai minimum dan maksimum.</p>

        <label for="minValue">Nilai Minimum</label><br />
        <input type="number" id="minValue" placeholder="Contoh: 1" /><br /><br />

        <label for="maxValue">Nilai Maksimum</label><br />
        <input type="number" id="maxValue" placeholder="Contoh: 15" /><br /><br />

        <div>
          <button type="button" id="calculateBtn">Hitung Bilangan Ganjil</button>
          <button type="button" class="secondary-btn" id="resetBtn">Reset</button>
        </div><br />

        <div id="resultBox">
          <h2>Hasil</h2>
          <p id="resultText">Masukkan nilai minimum dan maksimum, lalu klik tombol hitung.</p>
        </div><br />

        <div>
          Nama: <strong>Ammar Annajih Pasifiky</strong><br />
          NIM: <strong>103042310020</strong>
        </div>
      </section>
    </main>

    <script src="js/odd.js"></script>
  </body>
</html>
